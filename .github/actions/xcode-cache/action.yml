name: 'Xcode Cache'
description: 'Cache Xcode dependencies'
runs:
  using: "composite"
  steps:
    - run: echo "IMAGE=${ImageOS}-${ImageVersion}" >> $GITHUB_ENV
      shell: bash
    - name: Cache SPM
      uses: actions/cache@v4
      id: spm-cache
      with:
        path: spm_cache
        # Package.resolved is gitignored, so key off Package.swift. Avoid broad
        # restore-keys that reuse stale branch checkouts of stream-chat-swift.
        key: ${{ env.IMAGE }}-spm-${{ hashFiles('Package.swift') }}
